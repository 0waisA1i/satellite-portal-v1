<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Satellite Portal — CGL × Acme</title>
<style>
@import url('https://fonts.googleapis.com/css2?family=DM+Sans:ital,opsz,wght@0,9..40,300..800;1,9..40,300..800&family=Instrument+Serif:ital@0;1&display=swap');

:root{
  --bg:#000; --panel:rgba(255,255,255,0.035); --panel-2:rgba(255,255,255,0.055);
  --line:rgba(255,255,255,0.09); --line-2:rgba(255,255,255,0.14);
  --txt:#fff; --txt-2:rgba(255,255,255,0.72); --txt-3:rgba(255,255,255,0.45); --txt-4:rgba(255,255,255,0.28);
  --lime:#ECFD95; --mint:#CBF3BA; --cyan:#40E3FD; --grey:#C1C1C1; --red:#FF8585;
  --accent:var(--lime);
}
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
html,body{background:var(--bg);font-family:'DM Sans',-apple-system,BlinkMacSystemFont,sans-serif;color:var(--txt);-webkit-font-smoothing:antialiased}
body{min-height:100vh}
em.serif{font-family:'Instrument Serif',serif;font-style:italic;font-weight:400}
a{color:inherit}
button{font-family:inherit;cursor:pointer;border:none;background:none;color:inherit}
::selection{background:rgba(236,253,149,.2)}

/* ---------- top bar ---------- */
.topbar{position:sticky;top:0;z-index:40;display:flex;align-items:center;justify-content:space-between;
  padding:0 26px;height:58px;background:rgba(0,0,0,.82);backdrop-filter:blur(14px);border-bottom:1px solid var(--line)}
.tb-left{display:flex;align-items:center;gap:16px}
.brand{display:flex;align-items:center;gap:9px}
.brand svg{height:26px;width:26px}
.brand .b-name{font-size:15px;font-weight:700;letter-spacing:-0.01em}
.brand .b-sat{font-size:15px;font-weight:600;color:var(--accent);letter-spacing:-0.01em}
.brand .b-by{font-size:9px;font-weight:600;color:var(--txt-3);letter-spacing:.14em;text-transform:uppercase;margin-left:2px;border-left:1px solid var(--line-2);padding-left:10px}
.client-switch{position:relative}
.cs-btn{display:flex;align-items:center;gap:9px;padding:7px 12px;border-radius:9px;background:var(--panel);border:1px solid var(--line);font-size:13px;font-weight:600}
.cs-btn .cs-dot{width:7px;height:7px;border-radius:50%;background:var(--accent);box-shadow:0 0 9px var(--accent)}
.cs-btn .chev{color:var(--txt-3);font-size:10px;margin-left:2px}
.cs-menu{position:absolute;top:46px;left:0;min-width:240px;background:#0b0b0b;border:1px solid var(--line-2);border-radius:12px;padding:6px;box-shadow:0 20px 60px rgba(0,0,0,.8);display:none;z-index:60}
.cs-menu.open{display:block}
.cs-item{display:flex;align-items:center;gap:10px;padding:9px 11px;border-radius:8px;font-size:13px;font-weight:500;width:100%;text-align:left}
.cs-item:hover{background:var(--panel)}
.cs-item .ci-dot{width:8px;height:8px;border-radius:50%;flex-shrink:0}
.cs-item .ci-tier{margin-left:auto;font-size:8.5px;font-weight:700;letter-spacing:.1em;text-transform:uppercase;color:var(--txt-3)}
.tb-right{display:flex;align-items:center;gap:14px}
.tier-badge{display:inline-flex;align-items:center;gap:7px;padding:6px 13px;border-radius:99px;font-size:11px;font-weight:700;letter-spacing:.06em;text-transform:uppercase;
  background:rgba(236,253,149,.1);color:var(--accent);border:1px solid rgba(236,253,149,.24)}
.tier-badge .tb-dot{width:6px;height:6px;border-radius:50%;background:var(--accent);box-shadow:0 0 8px var(--accent)}
.avatar{width:32px;height:32px;border-radius:50%;background:linear-gradient(135deg,#2a2a2a,#111);border:1px solid var(--line-2);
  display:flex;align-items:center;justify-content:center;font-size:12px;font-weight:700;color:var(--txt-2)}

/* ---------- demo control strip ---------- */
.demo-bar{display:flex;align-items:center;gap:14px;justify-content:center;padding:10px 26px;background:rgba(236,253,149,.04);border-bottom:1px solid var(--line);flex-wrap:wrap}
.demo-lbl{font-size:9.5px;font-weight:700;letter-spacing:.16em;text-transform:uppercase;color:var(--txt-3)}
.seg{display:flex;background:var(--panel);border:1px solid var(--line);border-radius:10px;padding:3px;gap:2px}
.seg button{padding:6px 16px;border-radius:7px;font-size:12px;font-weight:600;color:var(--txt-3);letter-spacing:.01em;transition:.15s}
.seg button.on{background:var(--accent);color:#000}
.demo-note{font-size:11px;color:var(--txt-4)}

/* ---------- layout ---------- */
.wrap{max-width:1180px;margin:0 auto;padding:30px 26px 90px}
.page-head{display:flex;align-items:flex-end;justify-content:space-between;gap:24px;margin-bottom:8px}
.ph-left{display:flex;flex-direction:column;gap:7px}
.eyebrow{font-size:10px;font-weight:700;letter-spacing:.18em;text-transform:uppercase;color:rgba(236,253,149,.7)}
.ph-title{font-size:34px;font-weight:600;letter-spacing:-0.025em;line-height:1}
.ph-title em{color:var(--accent)}
.ph-sub{font-size:13.5px;color:var(--txt-3);max-width:560px;line-height:1.5}
.stat-strip{display:flex;gap:10px}
.ss{padding:11px 16px;border-radius:11px;background:var(--panel);border:1px solid var(--line);text-align:center;min-width:84px}
.ss-val{font-size:23px;font-weight:700;letter-spacing:-0.02em;line-height:1}
.ss-val em{font-size:19px;color:var(--accent)}
.ss-lbl{font-size:7.5px;font-weight:600;letter-spacing:.1em;text-transform:uppercase;color:var(--txt-3);margin-top:5px}

.feed-meta{display:flex;align-items:center;gap:10px;margin:24px 0 16px}
.feed-meta .fm-line{flex:1;height:1px;background:var(--line)}
.feed-meta .fm-txt{font-size:10px;font-weight:700;letter-spacing:.14em;text-transform:uppercase;color:var(--txt-3)}

/* ---------- signal card ---------- */
.cards{display:flex;flex-direction:column;gap:14px}
.card{position:relative;background:var(--panel);border:1px solid var(--line);border-radius:14px;overflow:hidden;transition:.2s}
.card:hover{border-color:var(--line-2);background:rgba(255,255,255,.05)}
.card .stripe{position:absolute;left:0;top:0;bottom:0;width:3px;z-index:2}
.card-in{padding:18px 22px 16px 24px}
.card-top{display:flex;align-items:flex-start;justify-content:space-between;gap:18px}
.ct-left{flex:1;min-width:0}
.badges{display:flex;align-items:center;gap:8px;flex-wrap:wrap;margin-bottom:9px}
.b-arch{padding:3px 11px;border-radius:99px;font-size:9.5px;font-weight:700;letter-spacing:.07em;text-transform:uppercase}
.b-tier{display:inline-flex;align-items:center;gap:5px;padding:3px 10px;border-radius:99px;font-size:9px;font-weight:600;letter-spacing:.06em;text-transform:uppercase}
.b-tier.gold{background:rgba(236,253,149,.1);color:var(--lime);border:1px solid rgba(236,253,149,.22)}
.b-tier.silver{background:rgba(193,193,193,.07);color:rgba(193,193,193,.8);border:1px solid rgba(193,193,193,.18)}
.b-tier .d{width:5px;height:5px;border-radius:50%}
.b-status{padding:3px 9px;border-radius:99px;font-size:8.5px;font-weight:700;letter-spacing:.08em;text-transform:uppercase}
.b-status.active{background:rgba(203,243,186,.1);color:var(--mint);border:1px solid rgba(203,243,186,.2)}
.b-status.stale{background:rgba(255,184,108,.1);color:#FFB86C;border:1px solid rgba(255,184,108,.2)}
.co-name{font-size:20px;font-weight:600;letter-spacing:-0.015em;line-height:1.15}
.co-tag{font-size:12.5px;color:var(--txt-2);margin-top:3px;line-height:1.4}
.trigger-row{display:flex;align-items:center;gap:9px;margin-top:11px;flex-wrap:wrap}
.trigger-chip{font-size:9.5px;font-weight:600;color:var(--txt-2);padding:3px 10px;border-radius:99px;border:1px solid var(--line-2);background:var(--panel);letter-spacing:.05em;text-transform:uppercase}
.whynow{font-size:9.5px;color:var(--txt-3)}
.whynow b{color:var(--accent);font-weight:700;letter-spacing:.04em}
.ct-stats{display:flex;gap:7px;flex-shrink:0}
.chip{padding:9px 14px;border-radius:10px;background:rgba(255,255,255,.04);border:1px solid var(--line);text-align:center;min-width:66px}
.chip-val{font-size:18px;font-weight:700;letter-spacing:-0.02em;line-height:1;display:block}
.chip-val.accent{color:var(--accent)}
.chip-lbl{font-size:6.5px;font-weight:600;letter-spacing:.1em;text-transform:uppercase;color:var(--txt-3);display:block;margin-top:4px}

.card-mid{display:flex;align-items:center;gap:12px;margin-top:15px;padding-top:14px;border-top:1px solid var(--line)}
.urg{padding:5px 13px;border-radius:99px;font-size:9.5px;font-weight:700;letter-spacing:.09em;text-transform:uppercase;flex-shrink:0}
.urg-now{background:rgba(236,253,149,.11);color:var(--lime);border:1px solid rgba(236,253,149,.24)}
.urg-mint{background:rgba(203,243,186,.1);color:var(--mint);border:1px solid rgba(203,243,186,.22)}
.urg-cyan{background:rgba(64,227,253,.09);color:var(--cyan);border:1px solid rgba(64,227,253,.22)}
.urg-plan{background:rgba(193,193,193,.08);color:var(--grey);border:1px solid rgba(193,193,193,.18)}

/* decision maker block */
.dm{flex:1;min-width:0}
.dm-hdr{font-size:8px;font-weight:700;letter-spacing:.13em;text-transform:uppercase;color:var(--txt-3);margin-bottom:4px}
.dm-titles{display:flex;align-items:center;gap:7px;flex-wrap:wrap}
.dm-pill{font-size:11px;font-weight:500;color:var(--txt);padding:3px 9px;border-radius:7px;background:rgba(255,255,255,.05);border:1px solid var(--line)}
.dm-angle{font-size:11px;color:var(--txt-2);line-height:1.4;margin-top:6px}
.dm-angle b{color:#fff;font-weight:600}
/* enriched contacts (stack+) */
.contact{display:flex;align-items:center;gap:10px;padding:7px 0;border-top:1px solid var(--line)}
.contact:first-of-type{border-top:none}
.c-av{width:26px;height:26px;border-radius:50%;background:linear-gradient(135deg,#222,#0d0d0d);border:1px solid var(--line-2);display:flex;align-items:center;justify-content:center;font-size:9px;font-weight:700;color:var(--txt-2);flex-shrink:0}
.c-name{font-size:12.5px;font-weight:600}
.c-title{font-size:10.5px;color:var(--txt-3)}
.c-meta{margin-left:auto;display:flex;gap:8px;align-items:center}
.c-tag{font-size:9px;color:var(--txt-3);font-family:monospace}
.c-li{font-size:9px;font-weight:700;letter-spacing:.06em;color:var(--cyan);text-decoration:none}

.card-actions{display:flex;align-items:center;gap:9px;margin-top:15px;padding-top:14px;border-top:1px solid var(--line);flex-wrap:wrap}
.btn{display:inline-flex;align-items:center;gap:7px;padding:9px 15px;border-radius:9px;font-size:12px;font-weight:600;transition:.15s}
.btn svg{width:14px;height:14px}
.btn-ghost{background:var(--panel);border:1px solid var(--line-2);color:var(--txt)}
.btn-ghost:hover{background:var(--panel-2);border-color:rgba(255,255,255,.28)}
.btn-accent{background:var(--accent);color:#000}
.btn-accent:hover{filter:brightness(1.08)}
.btn-lock{background:rgba(255,255,255,.025);border:1px dashed var(--line-2);color:var(--txt-4);cursor:not-allowed}
.btn-lock svg{opacity:.6}
.lock-tip{position:relative}
.lock-tip .tip{position:absolute;bottom:calc(100% + 8px);left:50%;transform:translateX(-50%);white-space:nowrap;
  background:#0b0b0b;border:1px solid var(--line-2);border-radius:8px;padding:7px 11px;font-size:10px;font-weight:600;
  color:var(--accent);opacity:0;pointer-events:none;transition:.15s;box-shadow:0 12px 30px rgba(0,0,0,.7);letter-spacing:.02em}
.lock-tip:hover .tip{opacity:1}
.src-link{margin-left:auto;font-size:9px;color:var(--accent);text-decoration:none;letter-spacing:.03em;white-space:nowrap}
.src-link::before{content:'SOURCE → ';font-weight:700;letter-spacing:.1em;color:var(--txt-4)}
.fp-flag{font-size:8.5px;color:var(--txt-3);display:flex;gap:6px;align-items:baseline;margin-top:11px;line-height:1.4}
.fp-flag .fp-lbl{font-size:8px;font-weight:700;letter-spacing:.1em;text-transform:uppercase;color:var(--red);flex-shrink:0}

/* ---------- archetype rail + strength + act pill ---------- */
.card-flex{display:flex;align-items:stretch}
.arch-rail{flex:0 0 152px;border-left:3px solid var(--ac);border-right:1px solid var(--line);
  padding:18px 16px;display:flex;flex-direction:column;justify-content:space-between;gap:18px;
  background:rgba(255,255,255,.02)}
.rail-arch{font-size:12px;font-weight:700;letter-spacing:.05em;text-transform:uppercase;color:var(--ac);line-height:1.3}
.rs-lbl{font-size:7.5px;font-weight:600;letter-spacing:.1em;text-transform:uppercase;color:var(--txt-3);margin-bottom:5px}
.rs-val{font-size:21px;font-weight:700;letter-spacing:-0.02em;line-height:1}
.rs-val span{font-size:11px;color:var(--txt-3);font-weight:500}
.strength-bar{height:6px;border-radius:99px;background:rgba(255,255,255,.1);overflow:hidden;margin-top:7px}
.strength-bar i{display:block;height:100%;border-radius:99px}
.card-main{flex:1;min-width:0;padding:18px 22px 16px}
.act-pill{padding:5px 13px;border-radius:99px;font-size:10px;font-weight:700;letter-spacing:.06em;text-transform:uppercase;flex-shrink:0;display:inline-flex;align-items:center;gap:7px}
.act-pill::before{content:'';width:5px;height:5px;border-radius:50%;background:currentColor}
.act-urgent{background:rgba(236,253,149,.11);color:var(--lime);border:1px solid rgba(236,253,149,.24)}
.act-soon{background:rgba(203,243,186,.1);color:var(--mint);border:1px solid rgba(203,243,186,.22)}
.act-plan{background:rgba(64,227,253,.09);color:var(--cyan);border:1px solid rgba(64,227,253,.22)}

/* ---------- locked / blurred ---------- */
.card.locked .card-flex{filter:blur(6px);opacity:.55;pointer-events:none;user-select:none}
.lock-overlay{position:absolute;inset:0;z-index:5;display:flex;flex-direction:column;align-items:center;justify-content:center;gap:11px;
  background:radial-gradient(ellipse at center,rgba(0,0,0,.35),rgba(0,0,0,.72))}
.lock-overlay .lk-ic{width:34px;height:34px;color:var(--accent);opacity:.85}
.lock-overlay .lk-t{font-size:14px;font-weight:600}
.lock-overlay .lk-s{font-size:11.5px;color:var(--txt-3);max-width:300px;text-align:center;line-height:1.45}
.lock-overlay .btn-accent{margin-top:3px}

/* ---------- upgrade banner row ---------- */
.upsell{margin-top:22px;border-radius:14px;border:1px solid rgba(236,253,149,.22);background:linear-gradient(135deg,rgba(236,253,149,.06),rgba(64,227,253,.04));
  padding:22px 24px;display:flex;align-items:center;gap:22px;flex-wrap:wrap}
.upsell .us-l{flex:1;min-width:240px}
.upsell .us-t{font-size:17px;font-weight:600;letter-spacing:-0.01em}
.upsell .us-t em{color:var(--accent)}
.upsell .us-s{font-size:12.5px;color:var(--txt-2);margin-top:6px;line-height:1.5}
.upsell .us-feats{display:flex;gap:8px;flex-wrap:wrap;margin-top:12px}
.us-feat{font-size:10px;font-weight:600;color:var(--txt-2);padding:4px 10px;border-radius:99px;background:rgba(255,255,255,.05);border:1px solid var(--line)}
.us-feat.locked{color:var(--txt-4)}
.us-feat.locked::before{content:'🔒 ';filter:grayscale(1);font-size:8px}

/* ---------- slide-over detail ---------- */
.scrim{position:fixed;inset:0;background:rgba(0,0,0,.6);backdrop-filter:blur(3px);z-index:80;opacity:0;pointer-events:none;transition:.25s}
.scrim.open{opacity:1;pointer-events:auto}
.sheet{position:fixed;top:0;right:0;bottom:0;width:min(560px,94vw);background:#0a0a0a;border-left:1px solid var(--line-2);
  z-index:90;transform:translateX(100%);transition:transform .3s cubic-bezier(.4,0,.2,1);overflow-y:auto;box-shadow:-30px 0 80px rgba(0,0,0,.7)}
.sheet.open{transform:translateX(0)}
.sheet-stripe{height:3px;width:100%}
.sheet-head{padding:22px 26px 18px;border-bottom:1px solid var(--line)}
.sh-close{position:absolute;top:18px;right:22px;width:30px;height:30px;border-radius:8px;background:var(--panel);border:1px solid var(--line);
  display:flex;align-items:center;justify-content:center;font-size:16px;color:var(--txt-2)}
.sh-close:hover{background:var(--panel-2)}
.sheet-body{padding:8px 26px 40px}
.sec{padding:18px 0;border-bottom:1px solid var(--line)}
.sec-hdr{font-size:9px;font-weight:700;letter-spacing:.14em;text-transform:uppercase;color:var(--txt-3);margin-bottom:9px;display:flex;align-items:center;gap:8px}
.sec-hdr .num{font-family:'Instrument Serif',serif;font-style:italic;color:rgba(236,253,149,.7);font-size:15px}
.sec-body{font-size:13.5px;line-height:1.6;color:var(--txt)}
.sec-body.muted{color:var(--txt-2)}
.kv{display:grid;grid-template-columns:130px 1fr;gap:8px 16px;font-size:12.5px}
.kv dt{color:var(--txt-3);font-weight:600}
.kv dd{color:var(--txt)}
.flags{display:flex;flex-wrap:wrap;gap:6px}
.flag{font-size:10px;font-weight:600;color:var(--mint);padding:4px 9px;border-radius:7px;background:rgba(203,243,186,.07);border:1px solid rgba(203,243,186,.16)}
.decaybar{height:7px;border-radius:99px;background:rgba(255,255,255,.08);overflow:hidden;margin-top:8px}
.decaybar i{display:block;height:100%;border-radius:99px;background:var(--accent)}

@media (max-width:760px){
  .card-flex{flex-direction:column}
  .arch-rail{flex-direction:row;align-items:center;justify-content:space-between;border-right:none;border-bottom:1px solid var(--line);flex-basis:auto}
  .card-top{flex-direction:column}.ct-stats{width:100%;justify-content:space-between}
  .card-mid{flex-direction:column;align-items:flex-start}.page-head{flex-direction:column;align-items:flex-start}
  .stat-strip{width:100%;justify-content:space-between}
}
</style>
</head>
<body>

<!-- TOP BAR -->
<div class="topbar">
  <div class="tb-left">
    <div class="brand">
      <svg viewBox="0 0 44 44" fill="none" xmlns="http://www.w3.org/2000/svg"><g clip-path="url(#c0)"><path d="M21.95 43.48C34.07 43.48 43.9 33.88 43.9 22.03 43.9 10.19 34.07.59 21.95.59 9.83.59.01 10.19.01 22.03.01 33.88 9.83 43.48 21.95 43.48Z" fill="#fff"/><path d="M32.16 12.82c2.04-1.33-24.78-2.25-19.95 15.95 1.55-3.27 4.16-4.98 6.2-7.24.36-.4-3.92 1.14-3.56.78 2.5-3.68 10.17-6.8 8.72-5.79-1.45 1.01-2.88 1.88-3.6 3.32-.65.77 3.55-.96 3.01-.36-3.45 1.91-6.79 7.68-7.42 12.43h1.4s8.12-.56 10.96-6.01c2.83-5.45 2.2-11.74 4.24-13.07Z" fill="#000"/></g><defs><clipPath id="c0"><rect width="44" height="43" fill="#fff" transform="translate(0 .5)"/></clipPath></defs></svg>
      <span class="b-name">Satellite</span>
      <span class="b-by">CleanTech GrowthLab</span>
    </div>
    <div class="client-switch">
      <button class="cs-btn" id="csBtn"><span class="cs-dot"></span><span id="csName">Acme Energy</span><span class="chev">▾</span></button>
      <div class="cs-menu" id="csMenu"></div>
    </div>
  </div>
  <div class="tb-right">
    <span class="tier-badge"><span class="tb-dot"></span><span id="tierLabel">Signal Feed</span></span>
    <div class="avatar">AE</div>
  </div>
</div>

<!-- DEMO CONTROL -->
<div class="demo-bar">
  <span class="demo-lbl">Preview tier</span>
  <div class="seg" id="tierSeg">
    <button data-tier="feed" class="on">Signal Feed</button>
    <button data-tier="stack">Signal Stack</button>
    <button data-tier="command">Signal Command</button>
  </div>
  <span class="demo-note">Demo control — toggle to see what each subscription tier unlocks</span>
</div>

<div class="wrap">
  <div class="page-head">
    <div class="ph-left">
      <span class="eyebrow">Signal Feed · <span id="periodLbl">June 2026</span></span>
      <h1 class="ph-title">This month's <em>buying signals</em></h1>
      <p class="ph-sub" id="phSub"></p>
    </div>
    <div class="stat-strip" id="statStrip"></div>
  </div>

  <div class="feed-meta"><span class="fm-txt" id="feedMetaTxt">Surfaced signals</span><span class="fm-line"></span></div>
  <div class="cards" id="cards"></div>
  <div id="upsellSlot"></div>
</div>

<!-- DETAIL SHEET -->
<div class="scrim" id="scrim"></div>
<aside class="sheet" id="sheet">
  <div class="sheet-stripe" id="sheetStripe"></div>
  <div class="sheet-head">
    <button class="sh-close" id="shClose">×</button>
    <div id="sheetHead"></div>
  </div>
  <div class="sheet-body" id="sheetBody"></div>
</aside>

<script>
/* ============== DATA — generic "Acme" clients, one account per signal ============== */

  'AE-001':90,'AE-002':45,'AE-003':28,'AE-004':21,'AE-005':68,'AE-006':50,'AE-007':30,'AE-008':84,
  'AW-001':90,'AW-002':85,'AW-003':28,'AW-004':21,'AW-005':90,'AW-006':83
};
Object.values(CLIENTS).forEach(c=>c.signals.forEach(s=>{ s.days=ACT_DAYS[s.id]??30; s.status='active'; if(s.conf<50)s.conf=60; }));
function actClass(d){ return d<=30 ? 'act-urgent' : d<=60 ? 'act-soon' : 'act-plan'; }

/* ============== RENDER ============== */
function accentVar(a){return ACCENTS[a]||ACCENTS.lime;}

function buildClientMenu(){
  const m=document.getElementById('csMenu');
  m.innerHTML=Object.entries(CLIENTS).map(([k,c])=>
    `<button class="cs-item" data-client="${k}"><span class="ci-dot" style="background:${accentVar(c.accent)};box-shadow:0 0 8px ${accentVar(c.accent)}"></span>${c.name}<span class="ci-tier">${c.signals.length} signals</span></button>`).join('');
  m.querySelectorAll('.cs-item').forEach(b=>b.onclick=()=>{state.client=b.dataset.client;document.getElementById('csMenu').classList.remove('open');render();});
}

function render(){
  const c=CLIENTS[state.client], t=TIERS[state.tier];
  document.documentElement.style.setProperty('--accent',accentVar(c.accent));
  document.getElementById('csName').textContent=c.name;
  document.querySelector('.avatar').textContent=c.code;
  document.getElementById('tierLabel').textContent=t.label;
  document.getElementById('phSub').textContent=c.sub;
  document.querySelectorAll('#tierSeg button').forEach(b=>b.classList.toggle('on',b.dataset.tier===state.tier));

  const active=c.signals.filter(s=>s.status==='active');
  const avg=Math.round(c.signals.reduce((a,s)=>a+s.conf,0)/c.signals.length);
  document.getElementById('statStrip').innerHTML=
    `<div class="ss"><span class="ss-val">${c.signals.length}</span><span class="ss-lbl">Signals</span></div>
     <div class="ss"><span class="ss-val accent" style="color:var(--accent)">${active.length}</span><span class="ss-lbl">Active</span></div>
     <div class="ss"><span class="ss-val"><em class="serif">${avg}</em></span><span class="ss-lbl">Avg conf</span></div>`;

  const cap = t.cap;
  const visible = c.signals.slice(0,cap), locked = c.signals.slice(cap);
  document.getElementById('feedMetaTxt').textContent =
    state.tier==='feed' ? `Surfaced this period · ${Math.min(cap,c.signals.length)} of ${c.signals.length}` : `All signals · ${c.signals.length}`;

  let html = visible.map(s=>cardHTML(s,t)).join('');
  html += locked.map(s=>lockedCardHTML(s)).join('');
  document.getElementById('cards').innerHTML=html;

  // upsell banner
  document.getElementById('upsellSlot').innerHTML = upsellHTML(state.tier, locked.length, c.signals.length);

  bindCards();
}

function cardHTML(s,t){
  const ac=accentVar(s.accent);
  const dmTitles = s.titles.map(x=>`<span class="dm-pill">${x}</span>`).join('');
  // decision-maker block: titles+angle on all tiers; enriched contacts only when tier.enrich
  const dmBlock = `<div class="dm">
      <div class="dm-hdr">Decision-makers to reach${t.enrich?' · enriched':''}</div>
      ${ t.enrich
        ? s.contacts.map(p=>`<div class="contact"><span class="c-av">${p.n.split(' ').map(w=>w[0]).join('')}</span>
            <div><div class="c-name">${p.n}</div><div class="c-title">${p.t}</div></div>
            <div class="c-meta"><span class="c-tag">${p.e}</span><a class="c-li" href="#" onclick="return false">${p.li}↗</a></div></div>`).join('')
        : `<div class="dm-titles">${dmTitles}</div>` }
      <div class="dm-angle">${s.angle}</div>
    </div>`;

  // action buttons
  const enrichBtn = t.enrich
    ? `<button class="btn btn-ghost" data-act="enrich" data-id="${s.id}">${IC.spark}Find &amp; enrich</button>`
    : `<span class="lock-tip"><button class="btn btn-lock" disabled>${IC.lock}Find &amp; enrich</button><span class="tip">Signal Stack →</span></span>`;
  const outreachBtn = t.outreach
    ? `<button class="btn btn-ghost" data-act="outreach" data-id="${s.id}">${IC.pen}Generate outreach</button>`
    : `<span class="lock-tip"><button class="btn btn-lock" disabled>${IC.lock}Generate outreach</button><span class="tip">Signal Stack →</span></span>`;
  const slackBtn = t.slack
    ? `<button class="btn btn-ghost" data-act="slack" data-id="${s.id}">${IC.slack}Push to Slack</button>` : '';

  return `<div class="card" data-id="${s.id}">
    <div class="card-flex">
      <div class="arch-rail" style="--ac:${ac}">
        <div class="rail-arch">${s.arch}</div>
        <div class="rail-strength">
          <div class="rs-lbl">Signal strength</div>
          <div class="rs-val">${s.conf}<span>/100</span></div>
          <div class="strength-bar"><i style="width:${s.conf}%;background:${ac}"></i></div>
        </div>
      </div>
      <div class="card-main">
        <div class="card-top">
          <div class="ct-left">
            <div class="co-name">${s.company}</div>
            <div class="co-tag">${s.sector}</div>
            <div class="trigger-row">
              <span class="trigger-chip">${s.trigger}</span>
              <span class="whynow"><b>WHY NOW</b> · ${s.whynow}</span>
            </div>
          </div>
          <div class="ct-stats">
            <div class="chip"><span class="chip-val">${s.deadline}</span><span class="chip-lbl">Deadline</span></div>
            <div class="chip"><span class="chip-val" style="font-size:13px">${s.volume}</span><span class="chip-lbl">30-day vol</span></div>
          </div>
        </div>
        <div class="card-mid">
          <span class="act-pill ${actClass(s.days)}">Act in ${s.days} days</span>
          ${dmBlock}
        </div>
        <div class="card-actions">
          <button class="btn btn-accent" data-act="detail" data-id="${s.id}">${IC.info}View signal detail</button>
          ${enrichBtn}${outreachBtn}${slackBtn}
          <a class="src-link" href="#" onclick="return false">verified ↗</a>
        </div>
        <div class="fp-flag"><span class="fp-lbl">Filtered out</span><span>${s.fp}</span></div>
      </div>
    </div>
  </div>`;
}

      <div class="arch-rail" style="--ac:rgba(255,255,255,.18)"><div class="rail-arch" style="color:rgba(255,255,255,.5)">${s.arch}</div></div>
      <div class="card-main">
        <div class="card-top"><div class="ct-left">
          <div class="co-name">${s.company}</div><div class="co-tag">${s.sector}</div>
        </div></div>
        <div class="card-mid"><span class="act-pill ${actClass(s.days)}">Act in ${s.days} days</span></div>
      </div>
    </div>
    <div class="lock-overlay">
      <span class="lk-ic">${IC.lock}</span>
      <div class="lk-t">1 more qualified signal this period</div>

    </div></div>`;
  if(tier==='stack') return `<div class="upsell"><div class="us-l">
      <div class="us-t">Unlock <em>Signal Command</em></div>
      <div class="us-s">Push qualified signals straight to a dedicated Slack channel the moment they clear threshold, add up to 4 segments, and bring your own custom sources.</div>
      <div class="us-feats"><span class="us-feat">Enriched contacts ✓</span><span class="us-feat">Generated outreach ✓</span><span class="us-feat locked">Slack push</span><span class="us-feat locked">Up to 4 segments</span><span class="us-feat locked">Custom sources</span></div>
    </div>
    <div style="margin-left:auto"><button class="btn btn-accent" data-act="upgrade" data-to="command">See Signal Command →</button></div></div>`;
  return `<div class="upsell"><div class="us-l">
      <div class="us-t">Unlock <em>Signal Stack</em> — ${lockedCount} more signal${lockedCount!==1?'s':''} waiting</div>
      <div class="us-s">Signal Feed gives you 5 archetypes a month with target titles and the angle. Signal Stack unlocks every confirmed signal, finds and enriches the named decision-makers, and generates trigger-specific outreach in one click.</div>
      <div class="us-feats"><span class="us-feat">Target titles + angle ✓</span><span class="us-feat locked">Unlimited signals</span><span class="us-feat locked">Find &amp; enrich contacts</span><span class="us-feat locked">Generate outreach</span><span class="us-feat locked">CRM enrichment</span></div>
    </div>
    <div style="margin-left:auto"><button class="btn btn-accent" data-act="upgrade" data-to="stack">Upgrade to Signal Stack →</button></div></div>`;
}

/* ============== INTERACTIONS ============== */
function findSig(id){return CLIENTS[state.client].signals.find(s=>s.id===id);}

function bindCards(){
  document.querySelectorAll('[data-act]').forEach(el=>{
    el.onclick=()=>{
      const act=el.dataset.act, id=el.dataset.id;
      if(act==='upgrade'){state.tier=el.dataset.to;render();window.scrollTo({top:0,behavior:'smooth'});return;}
      const s=findSig(id); if(!s)return;
      if(act==='detail')openSheet(s);
      else if(act==='enrich')enrich(s);
      else if(act==='outreach')openOutreach(s);
      else if(act==='slack')toast(`Pushed "${s.company}" to #acme-signals on Slack`);
    };
  });
}

function enrich(s){ openSheet(s,'contacts'); }

function openSheet(s,focus){
  const ac=accentVar(s.accent);
  document.getElementById('sheetStripe').style.background=ac;
  document.getElementById('sheetHead').innerHTML=
    `<div class="badges" style="margin-bottom:10px">
       <span class="b-arch" style="background:${ac}1a;color:${ac};border:1px solid ${ac}3a">${s.arch}</span>
       <span class="act-pill ${actClass(s.days)}">Act in ${s.days} days</span></div>
     <div class="co-name" style="font-size:24px">${s.company}</div>
     <div class="co-tag">${s.sector}</div>
     <div style="margin-top:15px;max-width:260px">
       <div class="rs-lbl">Signal strength</div>
       <div class="rs-val" style="margin-top:3px">${s.conf}<span>/100</span></div>
       <div class="strength-bar" style="margin-top:7px"><i style="width:${s.conf}%;background:${ac}"></i></div>
     </div>`;

  const t=TIERS[state.tier];
  const contactSec = t.enrich
    ? `<div class="sec"><div class="sec-hdr"><span class="num">5</span> Enriched decision-makers</div>
        ${s.contacts.map(p=>`<div class="contact"><span class="c-av">${p.n.split(' ').map(w=>w[0]).join('')}</span>
          <div><div class="c-name">${p.n}</div><div class="c-title">${p.t}</div></div>
          <div class="c-meta"><span class="c-tag">${p.e}</span><a class="c-li" href="#" onclick="return false">${p.li}↗</a></div></div>`).join('')}
        <div style="margin-top:12px"><button class="btn btn-accent" data-act="outreach" data-id="${s.id}">${IC.pen}Generate outreach</button></div></div>`
    : `<div class="sec"><div class="sec-hdr"><span class="num">5</span> Decision-makers to reach</div>
        <div class="dm-titles">${s.titles.map(x=>`<span class="dm-pill">${x}</span>`).join('')}</div>
        <div class="dm-angle" style="margin-top:9px">${s.angle}</div>
        <div style="margin-top:12px"><span class="lock-tip"><button class="btn btn-lock" disabled>${IC.lock}Find &amp; enrich named contacts</button></span>
        <span style="font-size:11px;color:var(--txt-3);margin-left:8px">Available on Signal Stack</span></div></div>`;

  document.getElementById('sheetBody').innerHTML=
    `<div class="sec"><div class="sec-hdr"><span class="num">1</span> Signal intelligence</div><div class="sec-body muted">${s.intel}</div></div>
     <div class="sec"><div class="sec-hdr"><span class="num">2</span> Summary</div><div class="sec-body muted">${s.summary}</div></div>
     <div class="sec"><div class="sec-hdr"><span class="num">3</span> Why now</div><div class="sec-body">${s.whynow} — act within ${s.days} days.</div></div>
     <div class="sec"><div class="sec-hdr"><span class="num">4</span> Suggested next step</div><div class="sec-body muted">${s.nextstep}</div></div>
     ${contactSec}
     <div class="sec"><div class="sec-hdr"><span class="num">6</span> Signal facts</div>
        <dl class="kv">
          <dt>Signal ID</dt><dd>${s.id}</dd>
          <dt>Trigger</dt><dd>${s.trigger}</dd>
          <dt>Signal strength</dt><dd>${s.conf} / 100</dd>
          <dt>Act within</dt><dd>${s.days} days</dd>
          <dt>Deadline</dt><dd>${s.deadline}</dd>
          <dt>Est. volume</dt><dd>${s.volume}</dd>
        </dl>
        <div class="decaybar"><i style="width:${s.conf}%;background:${ac}"></i></div></div>
     <div class="sec"><div class="sec-hdr"><span class="num">7</span> Rank-boost flags</div><div class="flags">${s.flags.map(f=>`<span class="flag">${f}</span>`).join('')}</div></div>
     <div class="sec" style="border-bottom:none"><div class="sec-hdr"><span class="num">8</span> False-positive filter</div><div class="sec-body" style="color:var(--txt-2)"><span style="color:var(--red);font-weight:700;font-size:10px;letter-spacing:.08em;text-transform:uppercase">Suppressed → </span>${s.fp}</div></div>`;

  document.getElementById('scrim').classList.add('open');
  document.getElementById('sheet').classList.add('open');
  // rebind buttons inside sheet
  document.querySelectorAll('#sheetBody [data-act]').forEach(el=>el.onclick=()=>{const s2=findSig(el.dataset.id);if(el.dataset.act==='outreach')openOutreach(s2);});
  if(focus==='contacts'){document.getElementById('sheetBody').scrollIntoView();}
}
function closeSheet(){document.getElementById('scrim').classList.remove('open');document.getElementById('sheet').classList.remove('open');}

function openOutreach(s){
  const p=s.contacts[0];
  const ac=accentVar(s.accent);
  const script=`Subject: ${s.whynow} — quick thought for ${s.company}\n\nHi ${p?p.n.split(' ')[0]:'there'},\n\nSaw ${s.company}'s ${s.trigger.toLowerCase()} (${s.arch.toLowerCase()}). With ${s.deadline} on the clock, most teams in your position are weighing how to get to documented compliance fast without pulling ops off-cycle.\n\nWe've helped comparable operators turn exactly this trigger into a defensible plan in weeks, not quarters. Worth a 20-minute look at how it maps to your situation?\n\nBest,\n[Your name]`;
  document.getElementById('sheetStripe').style.background=ac;
  document.getElementById('sheetHead').innerHTML=`<div class="eyebrow" style="color:${ac}">Generated outreach · ${s.id}</div><div class="co-name" style="font-size:22px;margin-top:6px">${s.company}</div><div class="co-tag">Drafted on the ${s.arch.toLowerCase()} trigger${p?' · to '+p.n:''}</div>`;
  document.getElementById('sheetBody').innerHTML=
    `<div class="sec"><div class="sec-hdr"><span class="num">→</span> Angle</div><div class="sec-body">${s.angle}</div></div>
     <div class="sec"><div class="sec-hdr"><span class="num">✎</span> Draft email</div>
       <pre style="white-space:pre-wrap;font-family:'DM Sans',sans-serif;font-size:13px;line-height:1.6;color:var(--txt);background:rgba(255,255,255,.03);border:1px solid var(--line);border-radius:10px;padding:16px">${script}</pre>
       <div style="margin-top:12px;display:flex;gap:9px"><button class="btn btn-accent" onclick="toast('Copied to clipboard')">Copy</button><button class="btn btn-ghost" onclick="toast('Pushed to CRM as a task')">Push to CRM</button></div></div>
     <div class="sec" style="border-bottom:none"><div class="sec-body" style="color:var(--txt-3);font-size:11.5px">Demo draft. In production this is generated per-signal from the trigger, the account context, and your messaging guardrails (Stage 10).</div></div>`;
  document.getElementById('scrim').classList.add('open');
  document.getElementById('sheet').classList.add('open');
}

function toast(msg){
  let el=document.createElement('div');el.textContent=msg;
  el.style.cssText='position:fixed;bottom:26px;left:50%;transform:translateX(-50%);background:var(--accent);color:#000;font-weight:700;font-size:13px;padding:11px 20px;border-radius:99px;z-index:120;box-shadow:0 14px 40px rgba(0,0,0,.5)';
  document.body.appendChild(el);setTimeout(()=>el.remove(),1900);
}

/* ============== INIT ============== */
document.getElementById('csBtn').onclick=()=>document.getElementById('csMenu').classList.toggle('open');
document.querySelectorAll('#tierSeg button').forEach(b=>b.onclick=()=>{state.tier=b.dataset.tier;render();});
document.getElementById('shClose').onclick=closeSheet;
document.getElementById('scrim').onclick=closeSheet;
document.addEventListener('keydown',e=>{if(e.key==='Escape')closeSheet();});
document.addEventListener('click',e=>{if(!e.target.closest('.client-switch'))document.getElementById('csMenu').classList.remove('open');});
buildClientMenu();
render();
</script>
</body>
</html>
